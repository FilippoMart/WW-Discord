<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WW Discord Stats</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1e2126;
    --border: #2c3038;
    --text: #e6e8eb;
    --muted: #9aa1ab;
    --accent: #7c9cff;
    --accent-dark: #5a78e0;
    --shadow-color: #c96a6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    padding: 24px;
  }
  h1 { margin: 0 0 4px; font-size: 1.6rem; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .panel h2 { margin-top: 0; font-size: 1.05rem; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  button {
    background: var(--accent);
    color: #10121a;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:hover { background: var(--accent-dark); }
  select, textarea, input[type="text"], input:not([type]) {
    background: #10121a;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 0.9rem;
  }
  textarea {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    font-family: ui-monospace, Consolas, monospace;
  }
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 14px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.88rem;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
  }
  th { background: #24272e; }
  tr:nth-child(even) td { background: #191b20; }
  tr.win-row td { background: #1c3324; color: #7fd99a; font-weight: 600; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    table { font-size: 0.78rem; }
    th, td { padding: 5px 7px; }
  }
  .shadow-yes { color: var(--shadow-color); font-weight: 600; }
  .status { font-size: 0.85rem; color: var(--muted); margin-bottom: 10px; }
  .error { color: #e07a7a; white-space: pre-wrap; }
  .note-box {
    margin-top: 10px;
    padding: 10px 12px;
    background: #10121a;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--muted);
  }
  .note-box a { color: var(--accent); }
  .note-box a:hover { color: var(--accent-dark); }
</style>
</head>
<body>

<h1>WW Discord Stats</h1>
<div class="subtitle">Interroga il database delle partite direttamente dal browser (sql.js, nessun server).</div>

<div class="panel">
  <div class="status" id="status">Caricamento database...</div>
</div>

<div class="panel">
  <h2>Statistiche rapide</h2>
  <div class="row">
    <button onclick="showWinRates()">% Vittorie</button>
    <button onclick="showUnderdogWin()">% Underdog</button>
    <button onclick="showShadowCounts()">% Ombra</button>
    <button onclick="showCattivoCounts()">% Cattivo</button>
    <button onclick="showCattiviInnati()">Dark Souls</button>
    <button onclick="showRolesCatalog()">Ruoli e Condizioni (RC)</button>
    <button onclick="showRoleRanking()">Ranking Ruoli</button>
    <button onclick="showAffezionati()">Affezionati al ruolo</button>
    <button onclick="showStreaks()">Serie</button>
    <button onclick="showMasterCounts()">Master</button>
    <button onclick="showPlayerCountDistribution()">Partite per numero di giocatori</button>
    <button onclick="showRuoliPossibiliDistribution()">Partite per set di ruoli possibili</button>
  </div>
</div>

<div class="panel">
  <h2>Composizione partita</h2>
  <div class="row">
    <select id="gameSelect"></select>
    <button onclick="showGameComposition()">Mostra composizione</button>
  </div>
</div>

<div class="panel">
  <h2>Storico giocatore</h2>
  <div class="row">
    <select id="playerSelect"></select>
    <button onclick="showPlayerHistory()">Mostra storico</button>
  </div>
</div>

<div class="panel">
  <h2>Storico per Ruolo</h2>
  <div class="row">
    <select id="roleSelect"></select>
    <button onclick="showRoleHistory()">Mostra storico ruolo</button>
  </div>
</div>

<div class="panel">
  <h2>Query SQL personalizzata</h2>
  <textarea id="sqlBox" placeholder="SELECT * FROM players;"></textarea>
  <div class="row" style="margin-top:10px;">
    <button onclick="runCustomQuery()">Esegui</button>
  </div>
</div>

<div class="panel">
  <h2>Risultato</h2>
  <div id="result"></div>
</div>

<script src="https://sql.js.org/dist/sql-wasm.js"></script>
<script>
let db = null;
let allGames = [];

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function renderTable(columns, values, rowClasses) {
  const container = document.getElementById('result');
  if (values.length === 0) {
    container.innerHTML = '<div class="note-box">Nessun risultato.</div>';
    return;
  }
  let html = '<div class="table-scroll"><table><thead><tr>';
  for (const col of columns) html += `<th>${escapeHtml(col)}</th>`;
  html += '</tr></thead><tbody>';
  values.forEach((row, i) => {
    const cls = rowClasses && rowClasses[i] ? ` class="${rowClasses[i]}"` : '';
    html += `<tr${cls}>`;
    for (const cell of row) html += `<td>${escapeHtml(cell === null ? '' : String(cell))}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function renderRows(columns, rows, rowClasses) {
  // rows: array of plain objects, matched against columns order
  const values = rows.map(r => columns.map(c => r[c]));
  renderTable(columns, values, rowClasses);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, s => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[s]));
}

function showError(e) {
  document.getElementById('result').innerHTML = `<div class="error">${escapeHtml(e.message || String(e))}</div>`;
}

function execToObjects(sql, params = []) {
  const stmt = db.prepare(sql);
  if (params.length) stmt.bind(params);
  const rows = [];
  while (stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}

function isWriteQuery(sql) {
  return /\b(INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|REPLACE|TRUNCATE|ATTACH|DETACH)\b/i.test(sql);
}

function runCustomQuery() {
  const sql = document.getElementById('sqlBox').value.trim();
  if (!sql) return;
  if (isWriteQuery(sql)) {
    document.getElementById('result').innerHTML = `
      <div class="note-box">Le query di scrittura (INSERT/UPDATE/DELETE/DROP/...) non sono permesse qui. Questo box è pensato solo per interrogare i dati (SELECT), non per modificarli.</div>
    `;
    return;
  }
  try {
    const res = db.exec(sql);
    if (res.length === 0) {
      document.getElementById('result').innerHTML = '<div class="note-box">Query eseguita, nessuna riga restituita.</div>';
      return;
    }
    renderTable(res[0].columns, res[0].values);
  } catch (e) {
    showError(e);
  }
}

// Limite inferiore del Wilson score interval (z=1.96, 95%): stima prudente di un tasso
// che tiene conto della dimensione del campione, non solo della percentuale grezza.
function wilsonLowerBound(wins, total, z = 1.96) {
  if (total === 0) return 0;
  const p = wins / total;
  const z2 = z * z;
  const denominator = 1 + z2 / total;
  const centre = p + z2 / (2 * total);
  const margin = z * Math.sqrt((p * (1 - p) + z2 / (4 * total)) / total);
  return (centre - margin) / denominator;
}

// Grafico SVG a linea, senza dipendenze esterne: punti = [{play, pct, successes, trials}]
function underdogChartSvg(points) {
  const W = 700, H = 220, padL = 40, padR = 16, padT = 16, padB = 34;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const n = points.length;
  const xAt = i => n === 1 ? padL + plotW / 2 : padL + (plotW * i / (n - 1));
  const maxY = Math.max(10, ...points.map(p => p.pct));
  const yAt = pct => padT + plotH - (plotH * pct / maxY);

  let gridHtml = '';
  const gridSteps = 4;
  for (let g = 0; g <= gridSteps; g++) {
    const val = maxY * g / gridSteps;
    const y = yAt(val);
    gridHtml += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}" stroke="#2c3038" stroke-width="1"/>`;
    gridHtml += `<text x="${(padL - 6).toFixed(1)}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="#9aa1ab">${val.toFixed(0)}%</text>`;
  }

  // Un'etichetta al primo punto di ogni mese (solo anno-mese, es. "26-06"),
  // più il giorno completo (senza numero partita) sull'ultimo punto in assoluto.
  const monthLabelIdxs = [];
  for (let i = 0; i < n; i++) {
    const month = points[i].play.slice(0, 5);
    const prevMonth = i > 0 ? points[i - 1].play.slice(0, 5) : null;
    if (i === 0 || month !== prevMonth) monthLabelIdxs.push(i);
  }
  const labelIdxs = Array.from(new Set([...monthLabelIdxs, n - 1])).sort((a, b) => a - b);
  let xLabelsHtml = '';
  for (const i of labelIdxs) {
    const label = i === n - 1 ? points[i].play.split('_')[0] : points[i].play.slice(0, 5);
    xLabelsHtml += `<text x="${xAt(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="10" fill="#9aa1ab">${escapeHtml(label)}</text>`;
  }

  const linePoints = points.map((p, i) => `${xAt(i).toFixed(1)},${yAt(p.pct).toFixed(1)}`).join(' ');
  const circles = points.map((p, i) => `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(p.pct).toFixed(1)}" r="3" fill="#7c9cff"><title>${escapeHtml(p.play)}: ${p.pct.toFixed(1)}% (${p.successes}/${p.trials})</title></circle>`).join('');

  return `
    <div class="table-scroll">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%; max-width:${W}px; height:auto; display:block;">
        ${gridHtml}
        <polyline points="${linePoints}" fill="none" stroke="#7c9cff" stroke-width="2"/>
        ${circles}
        ${xLabelsHtml}
      </svg>
    </div>
  `;
}

// Ordina per Wilson score decrescente (penalizza percentuali su pochi campioni),
// a parità per numeratore decrescente poi per totale crescente
function sortByRate(rows, numKey, totalKey) {
  return rows.slice().sort((a, b) => {
    const wsA = wilsonLowerBound(a[numKey], a[totalKey]);
    const wsB = wilsonLowerBound(b[numKey], b[totalKey]);
    if (wsB !== wsA) return wsB - wsA;
    if (b[numKey] !== a[numKey]) return b[numKey] - a[numKey];
    return a[totalKey] - b[totalKey];
  });
}

function showShadowCounts() {
  try {
    const rows = execToObjects(`
      SELECT a.nick AS nick, p.nome AS nome, r.ombra AS ombra
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      LEFT JOIN roles r ON r.ruolo = a.ruolo
      WHERE a.ruolo != 'MASTER'
    `);
    const stats = {};
    for (const row of rows) {
      if (!stats[row.nick]) stats[row.nick] = { nome: row.nome, ombra: 0, total: 0 };
      stats[row.nick].total += 1;
      if (row.ombra === 'Ombra') stats[row.nick].ombra += 1;
    }
    let result = Object.entries(stats).filter(([, s]) => s.total >= 5).map(([nick, s]) => ({
      Giocatore: `${s.nome} (${nick})`,
      Volte_Ombra: s.ombra,
      'Giocate': s.total,
      'Ombra %': ((s.ombra / s.total) * 100).toFixed(1) + '%',
      'Wilson Score': wilsonLowerBound(s.ombra, s.total).toFixed(3)
    }));
    result = sortByRate(result, 'Volte_Ombra', 'Giocate');
    renderRows(['Giocatore', 'Volte_Ombra', 'Giocate', 'Ombra %', 'Wilson Score'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box">Solo giocatori con almeno 5 partite giocate.</div>
    `;
  } catch (e) { showError(e); }
}

function showCattivoCounts() {
  try {
    const rows = execToObjects(`
      SELECT a.nick AS nick, p.nome AS nome, r.ombra AS ombra
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      LEFT JOIN roles r ON r.ruolo = a.ruolo
      WHERE a.ruolo != 'MASTER'
    `);
    const stats = {};
    for (const row of rows) {
      if (!stats[row.nick]) stats[row.nick] = { nome: row.nome, cattivo: 0, total: 0 };
      stats[row.nick].total += 1;
      if (row.ombra === 'Ombra' || row.ombra === 'Aiutante') stats[row.nick].cattivo += 1;
    }
    let result = Object.entries(stats).filter(([, s]) => s.total >= 5).map(([nick, s]) => ({
      Giocatore: `${s.nome} (${nick})`,
      Volte_Cattivo: s.cattivo,
      'Giocate': s.total,
      'Cattivo %': ((s.cattivo / s.total) * 100).toFixed(1) + '%',
      'Wilson Score': wilsonLowerBound(s.cattivo, s.total).toFixed(3)
    }));
    result = sortByRate(result, 'Volte_Cattivo', 'Giocate');
    renderRows(['Giocatore', 'Volte_Cattivo', 'Giocate', 'Cattivo %', 'Wilson Score'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>Cattivo</b> = ruoli Ombra + Aiutante (Traditore, Ghoul, Megera): chi è dalla parte oscura o la aiuta, non solo chi è "Ombra" in senso stretto. Solo giocatori con almeno 5 partite giocate.</div>
    `;
  } catch (e) { showError(e); }
}

function showCattiviInnati() {
  try {
    const rows = execToObjects(`
      SELECT a.nick AS nick, p.nome AS nome, a.ruolo AS ruolo, r.ombra AS ombra, gw.win_ruoli AS win_ruoli
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      LEFT JOIN roles r ON r.ruolo = a.ruolo
      LEFT JOIN game_wins gw ON gw.play = a.play
      WHERE a.ruolo != 'MASTER' AND (r.ombra = 'Ombra' OR r.ombra = 'Aiutante')
    `);
    const stats = {};
    for (const row of rows) {
      if (!stats[row.nick]) stats[row.nick] = { nome: row.nome, vinte: 0, total: 0 };
      stats[row.nick].total += 1;
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
      if (winRoles.includes(row.ruolo)) stats[row.nick].vinte += 1;
    }
    let result = Object.entries(stats).filter(([, s]) => s.total >= 5).map(([nick, s]) => ({
      Giocatore: `${s.nome} (${nick})`,
      Vinte: s.vinte,
      'Giocate da Cattivo': s.total,
      '% Win': ((s.vinte / s.total) * 100).toFixed(1) + '%',
      'Wilson Score': wilsonLowerBound(s.vinte, s.total).toFixed(3)
    }));
    result = sortByRate(result, 'Vinte', 'Giocate da Cattivo');
    renderRows(['Giocatore', 'Vinte', 'Giocate da Cattivo', '% Win', 'Wilson Score'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>Dark Souls:</b> tra le partite giocate con un ruolo Cattivo (Ombra + Aiutante: Traditore, Ghoul, Megera), quante volte si è vinto proprio da Cattivo. Solo giocatori con almeno 5 partite giocate da Cattivo.</div>
    `;
  } catch (e) { showError(e); }
}

function showRolesCatalog() {
  try {
    const rows = execToObjects(`
      SELECT r.ruolo AS Ruolo, r.aura AS Aura, r.misticismo AS Misticismo, r.fazione AS "Condizioni Vittoria",
             r.ombra AS Ombra, r.set_lune AS "Set", r.espansione AS Espansione,
             (SELECT COUNT(*) FROM assignments a WHERE a.ruolo = r.ruolo) AS Volte_Giocato
      FROM roles r
      ORDER BY CASE r.espansione
        WHEN 'Base' THEN 1
        WHEN 'Città' THEN 2
        WHEN 'Criminali' THEN 3
        WHEN 'Vampiri' THEN 4
        WHEN 'Amanti' THEN 5
        WHEN 'Faida' THEN 6
        WHEN 'Maledizioni' THEN 7
        WHEN 'Inquisizione' THEN 8
        WHEN 'Posseduto' THEN 9
        WHEN 'Nosferatu' THEN 10
        WHEN 'Speciale' THEN 11
        WHEN 'Fanmade' THEN 12
        ELSE 13
      END, r.fazione, r.ruolo
    `);
    const moonIcons = { '1 luna': '🌙', '2 lune': '🌙🌙', '3 lune': '🌙🌙🌙' };
    for (const row of rows) row.Set = moonIcons[row.Set] || '';
    renderRows(['Ruolo', 'Aura', 'Misticismo', 'Condizioni Vittoria', 'Ombra', 'Set', 'Espansione', 'Volte_Giocato'], rows);
    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>Legenda:</b> O = Oscura, P = Pura, M = Mistico, NM = Non Mistico</div>
      <div class="note-box"><b>Regolamenti:</b>
        <a href="docs/RuoliDueLune.pdf" target="_blank">Ruoli 2 Lune</a> ·
        <a href="docs/RegoleDueLune.pdf" target="_blank">Regole 2 Lune</a> ·
        <a href="docs/RuoliTreLune.pdf" target="_blank">Ruoli 3 Lune</a> ·
        <a href="docs/RegoleTreLune.pdf" target="_blank">Regole 3 Lune</a>
      </div>
    `;
  } catch (e) { showError(e); }
}

function showRoleRanking() {
  try {
    const rows = execToObjects(`
      SELECT a.ruolo AS ruolo, gw.win_ruoli AS win_ruoli
      FROM assignments a
      JOIN game_wins gw ON gw.play = a.play
      WHERE a.ruolo != 'MASTER'
    `);
    const stats = {};
    for (const row of rows) {
      if (!stats[row.ruolo]) stats[row.ruolo] = { giocate: 0, vinte: 0 };
      stats[row.ruolo].giocate += 1;
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
      if (winRoles.includes(row.ruolo)) stats[row.ruolo].vinte += 1;
    }
    const result = Object.entries(stats).map(([ruolo, s]) => ({
      Ruolo: ruolo,
      Giocate: s.giocate,
      Vinte: s.vinte,
      'Win %': (s.vinte / s.giocate * 100).toFixed(1) + '%',
      'Wilson Score': wilsonLowerBound(s.vinte, s.giocate).toFixed(3),
      _wilson: wilsonLowerBound(s.vinte, s.giocate)
    })).sort((a, b) => b._wilson - a._wilson || b.Vinte - a.Vinte || a.Giocate - b.Giocate);
    renderRows(['Ruolo', 'Vinte', 'Giocate', 'Win %', 'Wilson Score'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box">Tasso di vittoria aggregato per ciascun ruolo (su tutti i giocatori che l'hanno interpretato), ordinato per Wilson Score. Solo i ruoli giocati almeno una volta compaiono qui.</div>
    `;
  } catch (e) { showError(e); }
}

function showPlayerCountDistribution() {
  try {
    const rows = execToObjects(`
      SELECT COUNT(*) AS n
      FROM assignments
      WHERE ruolo != 'MASTER'
      GROUP BY play
    `);
    const counts = {};
    for (const row of rows) counts[row.n] = (counts[row.n] || 0) + 1;
    const sizes = [8, 9, 10, 11, 12, 13, 14, 15];
    const result = sizes.map(s => ({ Numero_Giocatori: s, Numero_Partite: counts[s] || 0 }));
    renderRows(['Numero_Giocatori', 'Numero_Partite'], result);
  } catch (e) { showError(e); }
}

function moonify(text) {
  const match = text.match(/^(\d+)\s*lun[ae]/);
  if (!match) return text;
  return '🌙'.repeat(parseInt(match[1], 10)) + text.slice(match[0].length);
}

function showRuoliPossibiliDistribution() {
  try {
    const rows = execToObjects(`
      SELECT ruoli_possibili AS Ruoli_Possibili, COUNT(*) AS Numero_Partite
      FROM game_ruoli_possibili
      GROUP BY ruoli_possibili
      ORDER BY Numero_Partite DESC, Ruoli_Possibili
    `);
    for (const row of rows) row.Ruoli_Possibili = moonify(row.Ruoli_Possibili);
    renderRows(['Ruoli_Possibili', 'Numero_Partite'], rows);
  } catch (e) { showError(e); }
}

function showAffezionati() {
  try {
    const rows = execToObjects(`
      SELECT a.nick AS nick, p.nome AS nome, a.ruolo AS ruolo
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      WHERE a.ruolo != 'MASTER'
    `);
    const nomeByNick = {};
    const totalByNick = {};
    for (const r of rows) {
      nomeByNick[r.nick] = r.nome;
      totalByNick[r.nick] = (totalByNick[r.nick] || 0) + 1;
    }

    const countByRuolo = {};
    for (const r of rows) {
      if (!countByRuolo[r.ruolo]) countByRuolo[r.ruolo] = {};
      countByRuolo[r.ruolo][r.nick] = (countByRuolo[r.ruolo][r.nick] || 0) + 1;
    }

    const result = [];
    for (const ruolo of Object.keys(countByRuolo).sort()) {
      const entries = Object.entries(countByRuolo[ruolo])
        .map(([nick, count]) => ({ nick, count, total: totalByNick[nick], pct: count / totalByNick[nick] }))
        .filter(e => e.count >= 3);
      if (entries.length === 0) continue;
      const maxPct = Math.max(...entries.map(e => e.pct));
      for (const e of entries.filter(e => e.pct === maxPct)) {
        result.push({
          Ruolo: ruolo,
          Giocatore: `${nomeByNick[e.nick]} (${e.nick})`,
          Volte: e.count,
          'Giocate': e.total,
          Percentuale: (e.pct * 100).toFixed(1) + '%'
        });
      }
    }
    renderRows(['Ruolo', 'Giocatore', 'Volte', 'Giocate', 'Percentuale'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box">Per ogni ruolo giocato almeno 3 volte dalla stessa persona, mostra chi lo ha interpretato con la percentuale più alta rispetto alle proprie partite giocate (a pari merito compaiono più giocatori).</div>
    `;
  } catch (e) { showError(e); }
}

function showMasterCounts() {
  try {
    const FAZIONI = ['Villaggio', 'Mistici', 'Criminali', 'Inquisizione', 'Capobranco',
                     'Lupo Reietto', 'Lupo Solitario', 'Vampiro', 'Negromante', 'Nosferatu', 'Posseduto'];

    const winRows = execToObjects(`
      SELECT p.nome || ' (' || a.nick || ')' AS Master, gw.win AS Vittoria
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      JOIN game_wins gw ON gw.play = a.play
      WHERE a.ruolo = 'MASTER'
    `);
    const stats = {};
    for (const row of winRows) {
      if (!stats[row.Master]) stats[row.Master] = { total: 0, factions: {} };
      stats[row.Master].total += 1;
      const factions = (row.Vittoria || '').split(',').map(s => s.trim()).filter(Boolean);
      for (const f of factions) {
        stats[row.Master].factions[f] = (stats[row.Master].factions[f] || 0) + 1;
      }
    }
    const OMBRE_FAZIONI = ['Capobranco', 'Lupo Reietto', 'Lupo Solitario', 'Vampiro', 'Negromante', 'Nosferatu', 'Posseduto'];
    const breakdown = Object.keys(stats).sort().map(master => {
      const entry = { Master: master, Masterate: stats[master].total };
      const ombre = OMBRE_FAZIONI.reduce((sum, f) => sum + (stats[master].factions[f] || 0), 0);
      entry.Umani = stats[master].total - ombre;
      entry.Ombre = ombre;
      for (const f of FAZIONI) entry[f] = stats[master].factions[f] || 0;
      return entry;
    });
    renderRows(['Master', 'Masterate', 'Umani', 'Ombre', ...FAZIONI], breakdown);
  } catch (e) { showError(e); }
}

// Calcola, per ogni giocatore, la striscia di vittorie/sconfitte più lunga di sempre
// e la striscia attuale (in corso, cioè quella che finisce con la sua ultima partita giocata).
// Data una sequenza di booleani (in ordine cronologico), calcola la striscia più lunga
// di true e quella attuale (cioè quella che finisce con l'ultimo elemento).
function computeStreakStats(boolResults) {
  let longestTrue = 0, runTrue = 0;
  for (const val of boolResults) {
    runTrue = val ? runTrue + 1 : 0;
    longestTrue = Math.max(longestTrue, runTrue);
  }
  return { longest: longestTrue, current: runTrue };
}

function computeAllPlayerStreaks() {
  const rows = execToObjects(`
    SELECT a.nick AS nick, p.nome AS nome, a.play AS play, a.ruolo AS ruolo, gw.win_ruoli AS win_ruoli
    FROM assignments a
    JOIN players p ON p.nick = a.nick
    JOIN game_wins gw ON gw.play = a.play
    WHERE a.ruolo != 'MASTER'
    ORDER BY a.nick, a.play
  `);
  const byNick = {};
  for (const row of rows) {
    if (!byNick[row.nick]) byNick[row.nick] = { nome: row.nome, results: [] };
    const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
    byNick[row.nick].results.push(winRoles.includes(row.ruolo));
  }
  const streaks = {};
  for (const [nick, s] of Object.entries(byNick)) {
    const { longest, current } = computeStreakStats(s.results);
    streaks[nick] = { nome: s.nome, longestWin: longest, curWin: current };
  }
  return streaks;
}

function showStreaks() {
  try {
    const winStreaks = computeAllPlayerStreaks();
    const winEntries = Object.entries(winStreaks);
    const ombraStreaks = computeAllPlayerOmbraStreaks();
    const ombraEntries = Object.entries(ombraStreaks);
    const cattivoStreaks = computeAllPlayerCattivoStreaks();
    const cattivoEntries = Object.entries(cattivoStreaks);

    function topN(entries, getValue) {
      const max = Math.max(...entries.map(([, s]) => getValue(s)));
      const leaders = entries.filter(([, s]) => getValue(s) === max).map(([, s]) => s.nome);
      return { max, leaders: leaders.join(', ') };
    }

    const recordWin = topN(winEntries, s => s.longestWin);
    const currentWin = topN(winEntries, s => s.curWin);
    const recordOmbra = topN(ombraEntries, s => s.longestOmbra);
    const currentOmbra = topN(ombraEntries, s => s.curOmbra);
    const recordCattivo = topN(cattivoEntries, s => s.longestCattivo);
    const currentCattivo = topN(cattivoEntries, s => s.curCattivo);

    const result = [
      { Categoria: 'Record assoluto vittorie consecutive', Giocatore: recordWin.leaders, Numero: recordWin.max },
      { Categoria: 'Record attuale vittorie consecutive', Giocatore: currentWin.max > 0 ? currentWin.leaders : '—', Numero: currentWin.max },
      { Categoria: 'Record assoluto Ombra consecutive', Giocatore: recordOmbra.leaders, Numero: recordOmbra.max },
      { Categoria: 'Record attuale Ombra consecutive', Giocatore: currentOmbra.max > 0 ? currentOmbra.leaders : '—', Numero: currentOmbra.max },
      { Categoria: 'Record assoluto Cattivo consecutive', Giocatore: recordCattivo.leaders, Numero: recordCattivo.max },
      { Categoria: 'Record attuale Cattivo consecutive', Giocatore: currentCattivo.max > 0 ? currentCattivo.leaders : '—', Numero: currentCattivo.max }
    ];
    renderRows(['Categoria', 'Giocatore', 'Numero'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box">"Attuale" conta solo se la striscia è ancora aperta, cioè se l'ultima partita giocata da quella persona rientra nella striscia (l'ultima partita in assoluto deve essere una vittoria per lo streak di vittorie, un ruolo Ombra per quello di Ombra, Ombra o Aiutante per quello di Cattivo). A parità di numero compaiono più giocatori.</div>
    `;
  } catch (e) { showError(e); }
}

// Per ogni coppia di giocatori che ha giocato almeno una partita insieme:
// partite insieme, volte in cui hanno vinto entrambi, volte in cui hanno perso entrambi.
function computeCompagniStats() {
  const rows = execToObjects(`
    SELECT a.play AS play, a.nick AS nick, p.nome AS nome, a.ruolo AS ruolo, gw.win_ruoli AS win_ruoli
    FROM assignments a
    JOIN players p ON p.nick = a.nick
    JOIN game_wins gw ON gw.play = a.play
    WHERE a.ruolo != 'MASTER'
  `);
  const byPlay = {};
  for (const row of rows) {
    if (!byPlay[row.play]) byPlay[row.play] = [];
    const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
    byPlay[row.play].push({ nick: row.nick, nome: row.nome, won: winRoles.includes(row.ruolo) });
  }

  const pairs = {};
  for (const players of Object.values(byPlay)) {
    for (let i = 0; i < players.length; i++) {
      for (let j = i + 1; j < players.length; j++) {
        const [a, b] = [players[i], players[j]].sort((x, y) => x.nick.localeCompare(y.nick));
        const key = a.nick + ' | ' + b.nick;
        if (!pairs[key]) {
          pairs[key] = {
            nickA: a.nick, nickB: b.nick,
            labelA: `${a.nome} (${a.nick})`, labelB: `${b.nome} (${b.nick})`,
            insieme: 0, vinteInsieme: 0, perseInsieme: 0
          };
        }
        pairs[key].insieme += 1;
        if (a.won && b.won) pairs[key].vinteInsieme += 1;
        if (!a.won && !b.won) pairs[key].perseInsieme += 1;
      }
    }
  }
  return pairs;
}

function showUnderdogWin() {
  try {
    const gameRows = execToObjects(`
      SELECT gw.play AS play, gw.win_ruoli AS win_ruoli,
             (SELECT COUNT(*) FROM assignments a2 WHERE a2.play = gw.play AND a2.ruolo != 'MASTER') AS N
      FROM game_wins gw
    `);
    const gameInfo = {};
    for (const g of gameRows) {
      const winRoles = (g.win_ruoli || '').split(',').map(s => s.trim()).filter(Boolean);
      gameInfo[g.play] = { N: g.N, W: winRoles.length, winRoles };
    }

    const assignRows = execToObjects(`
      SELECT a.play AS play, a.nick AS nick, p.nome AS nome, a.ruolo AS ruolo
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      WHERE a.ruolo != 'MASTER'
    `);

    const stats = {};
    for (const row of assignRows) {
      const info = gameInfo[row.play];
      if (!info || info.N === 0) continue;
      if (!stats[row.nick]) stats[row.nick] = { nome: row.nome, partite: 0, vittorie: 0, successes: 0, trials: 0 };
      const s = stats[row.nick];
      s.partite += 1;
      s.trials += info.N; // ogni partita giocata conta nel denominatore, non solo le vittorie
      if (info.winRoles.includes(row.ruolo)) {
        s.vittorie += 1;
        s.successes += info.N - info.W;
      }
    }

    let result = Object.entries(stats).filter(([, s]) => s.vittorie > 0 && s.trials >= 50).map(([nick, s]) => ({
      Giocatore: `${s.nome} (${nick})`,
      'Giocatori Battuti': s.successes,
      'Giocatori Affrontati': s.trials,
      '% Underdog': (s.successes / s.trials * 100).toFixed(1) + '%',
      'Wilson Score': wilsonLowerBound(s.successes, s.trials).toFixed(3),
      _wilson: wilsonLowerBound(s.successes, s.trials)
    }));
    result.sort((a, b) => b._wilson - a._wilson || b['Giocatori Battuti'] - a['Giocatori Battuti'] || a['Giocatori Affrontati'] - b['Giocatori Affrontati']);
    renderRows(['Giocatore', 'Giocatori Battuti', 'Giocatori Affrontati', '% Underdog', 'Wilson Score'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box">
        Quanto sei stato "underdog" nelle tue vittorie, cioè quanto eri in minoranza tra chi ha vinto.<br><br>
        <b>Giocatori Battuti:</b> quante persone in totale erano escluse dai gruppi vincenti nelle tue vittorie (sommate su tutte le vittorie).<br>
        <b>Giocatori Affrontati:</b> quante persone in totale hai incontrato in <i>tutte</i> le partite giocate, vinte o perse.<br>
        <b>% Underdog</b> = Giocatori Battuti / Giocatori Affrontati: le sconfitte contano (aggiungono al denominatore senza aggiungere al numeratore), quindi una singola vittoria molto esclusiva in mezzo a tante sconfitte non gonfia il numero.<br>
        <b>Wilson Score</b> = stessa frazione, corretta per la dimensione del campione: è il criterio di ordinamento, così vincere spesso in minoranza batte una singola vittoria fortunata su poche partite giocate.<br>
        Solo giocatori che hanno affrontato almeno 50 persone in totale.
      </div>
    `;
  } catch (e) { showError(e); }
}

function showPlayerHistory() {
  const nick = document.getElementById('playerSelect').value;
  if (!nick) return;
  try {
    const rows = execToObjects(`
      SELECT a.play AS Partita, a.ruolo AS ruolo,
             COALESCE(r.fazione, '') AS "Condizioni Vittoria",
             COALESCE(fo.fazione_finale, r.fazione, '') AS "Condizioni Vittoria Finale",
             COALESCE(r.ombra, '') AS Ombra,
             gw.win AS win, gw.win_ruoli AS win_ruoli,
             (SELECT COUNT(*) FROM assignments a2 WHERE a2.play = a.play AND a2.ruolo != 'MASTER') AS N
      FROM assignments a
      LEFT JOIN roles r ON r.ruolo = a.ruolo
      LEFT JOIN fazione_overrides fo ON fo.play = a.play AND fo.nick = a.nick
      LEFT JOIN game_wins gw ON gw.play = a.play
      WHERE a.nick = ? AND a.ruolo != 'MASTER'
      ORDER BY a.play
    `, [nick]);
    const result = rows.map(row => {
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
      return {
        Partita: row.Partita,
        Ruolo: row.ruolo,
        'Condizioni Vittoria': row['Condizioni Vittoria'],
        'Condizioni Vittoria Finale': row['Condizioni Vittoria Finale'],
        Ombra: row.Ombra,
        Vittoria: winRoles.includes(row.ruolo) ? 'Sì' : 'No'
      };
    });
    renderRows(['Partita', 'Ruolo', 'Condizioni Vittoria', 'Condizioni Vittoria Finale', 'Ombra', 'Vittoria'], result);
    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>Condizioni Vittoria Finale:</b> uguali a quelle di inizio partita, tranne per eventi accaduti durante la partita (dedotti dalle note): il romeo di Giulietta prende <b>Romeo</b>, i gildati del Capogilda prendono <b>Criminali</b>, i vampirizzati prendono <b>Vampiro</b>, il Contadino Lupo svegliato prende <b>Capobranco, Lupo Reietto</b>, il Fanatico prende la condizione di vittoria del ruolo di cui è fanatico. Tutte le statistiche sottostanti usano questa colonna, non quella di inizio partita.</div>
    `;

    const totalGames = rows.length;
    const totalWins = result.filter(r => r.Vittoria === 'Sì').length;

    // Andamento % Underdog nel tempo: cumulativo partita dopo partita, in ordine cronologico
    let cumSuccesses = 0, cumTrials = 0;
    const underdogPoints = rows.map(row => {
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim()).filter(Boolean);
      const N = row.N || 0;
      const won = winRoles.includes(row.ruolo);
      cumTrials += N;
      if (won) cumSuccesses += (N - winRoles.length);
      return {
        play: row.Partita,
        pct: cumTrials > 0 ? (cumSuccesses / cumTrials * 100) : 0,
        successes: cumSuccesses,
        trials: cumTrials
      };
    });
    const underdogChartPoints = underdogPoints.slice(5); // salta le prime 5 partite: assestamento iniziale, troppo rumoroso
    const underdogChartHtml = underdogChartPoints.length > 0
      ? underdogChartSvg(underdogChartPoints)
      : '<div class="note-box">Servono più di 5 partite per mostrare l\'andamento.</div>';

    // Condizioni composte: solo per questa tabella, ESCLUSIVE rispetto alle atomiche
    // (se un ruolo corrisponde esattamente a una composta, conta solo per quella, non anche per i singoli token)
    const COMPOSTE = [
      { nome: 'Città', set: ['Villaggio', 'Mistici', 'Criminali', 'Inquisizione'] },
      { nome: 'Branco', set: ['Capobranco', 'Lupo Reietto'] },
      { nome: 'Traditore', set: ['Capobranco', 'Lupo Reietto', 'Lupo Solitario'] },
      { nome: 'Ghoul', set: ['Vampiro', 'Nosferatu'] },
      { nome: 'Megera', set: ['Capobranco', 'Lupo Reietto', 'Lupo Solitario', 'Vampiro', 'Nosferatu', 'Negromante', 'Posseduto'] }
    ];
    function matchesComposta(tokens, set) {
      return tokens.length === set.length && set.every(t => tokens.includes(t));
    }

    const allFazioni = execToObjects('SELECT DISTINCT fazione FROM roles');
    const atomicTokens = new Set();
    for (const r of allFazioni) {
      for (const t of (r.fazione || '').split(',').map(s => s.trim()).filter(Boolean)) atomicTokens.add(t);
    }
    atomicTokens.add('Romeo'); // condizione finale-partita (mai una fazione di partenza di un ruolo): il romeo di Giulietta

    const condStats = {};
    for (const t of atomicTokens) condStats[t] = { giocate: 0, vinte: 0 };
    for (const composta of COMPOSTE) condStats[composta.nome] = { giocate: 0, vinte: 0 };

    for (const row of rows) {
      const tokens = (row['Condizioni Vittoria Finale'] || '').split(',').map(s => s.trim()).filter(Boolean);
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
      const winTokens = (row.win || '').split(',').map(s => s.trim());
      const won = winRoles.includes(row.ruolo);
      const composta = COMPOSTE.find(c => matchesComposta(tokens, c.set));
      if (composta) {
        condStats[composta.nome].giocate += 1;
        if (won) condStats[composta.nome].vinte += 1;
      } else {
        for (const t of tokens) {
          condStats[t].giocate += 1;
          if (won && winTokens.includes(t)) condStats[t].vinte += 1;
        }
      }
    }
    const condRows = Object.entries(condStats).map(([cond, s]) => ({
      'Condizione Vittoria': cond,
      Giocate: s.giocate,
      Vinte: s.vinte,
      Perse: s.giocate - s.vinte,
      '% Win': s.giocate > 0 ? s.vinte / s.giocate : 0,
      'Wilson Score': wilsonLowerBound(s.vinte, s.giocate)
    })).sort((a, b) => b['Wilson Score'] - a['Wilson Score'] || a.Giocate - b.Giocate);

    function condTableHtml(rows) {
      let h = '<div class="table-scroll"><table><thead><tr><th>Condizione Vittoria</th><th>Giocate</th><th>Vinte</th><th>Perse</th><th>% Win</th><th>Wilson Score</th></tr></thead><tbody>';
      for (const row of rows) {
        h += `<tr><td>${escapeHtml(row['Condizione Vittoria'])}</td><td>${row.Giocate}</td><td>${row.Vinte}</td><td>${row.Perse}</td><td>${(row['% Win'] * 100).toFixed(1)}%</td><td>${row['Wilson Score'].toFixed(3)}</td></tr>`;
      }
      h += '</tbody></table></div>';
      return h;
    }
    const html = condTableHtml(condRows);

    // Condizioni di Vittoria Implose: raggruppano più condizioni esplose in un'unica categoria
    const IMPLOSE_GROUPS = {
      'Umani': ['Mistici', 'Villaggio', 'Criminali', 'Inquisizione', 'Città'],
      'Ombre': ['Capobranco', 'Lupo Reietto', 'Lupo Solitario', 'Vampiro', 'Negromante', 'Nosferatu', 'Posseduto', 'Branco'],
      'Aiutanti': ['Traditore', 'Megera', 'Ghoul'],
      'Amanti': ['Angelo', 'Giulietta', 'Romeo'],
      'Afazione': ['Pazzo', 'Giullare', 'Viaggiatore']
    };
    const implodedRows = Object.entries(IMPLOSE_GROUPS).map(([gruppo, members]) => {
      const giocate = members.reduce((sum, m) => sum + (condStats[m] ? condStats[m].giocate : 0), 0);
      const vinte = members.reduce((sum, m) => sum + (condStats[m] ? condStats[m].vinte : 0), 0);
      return {
        'Condizione Vittoria': gruppo,
        Giocate: giocate,
        Vinte: vinte,
        Perse: giocate - vinte,
        '% Win': giocate > 0 ? vinte / giocate : 0,
        'Wilson Score': wilsonLowerBound(vinte, giocate)
      };
    }).sort((a, b) => b['Wilson Score'] - a['Wilson Score'] || a.Giocate - b.Giocate);
    const implodedHtml = condTableHtml(implodedRows);
    const pctVittorie = totalGames > 0 ? (totalWins / totalGames * 100).toFixed(1) : '0.0';
    const myStreak = computeAllPlayerStreaks()[nick];
    const myOmbraStreak = computeAllPlayerOmbraStreaks()[nick];
    const myCattivoStreak = computeAllPlayerCattivoStreaks()[nick];
    const streakHtml = (myStreak || myOmbraStreak || myCattivoStreak) ? `
      <div class="note-box">
        <b>Streak:</b>
        record vittorie consecutive: ${myStreak ? myStreak.longestWin : 0} (attuale: ${myStreak ? myStreak.curWin : 0}) —
        record Ombra consecutive: ${myOmbraStreak ? myOmbraStreak.longestOmbra : 0} (attuale: ${myOmbraStreak ? myOmbraStreak.curOmbra : 0}) —
        record Cattivo consecutive: ${myCattivoStreak ? myCattivoStreak.longestCattivo : 0} (attuale: ${myCattivoStreak ? myCattivoStreak.curCattivo : 0})
      </div>
    ` : '';

    const allPairs = Object.values(computeCompagniStats()).filter(p => p.nickA === nick || p.nickB === nick);
    function bestCompagno(successKey) {
      if (allPairs.length === 0) return '—';
      const withScore = allPairs.map(p => ({
        altro: p.nickA === nick ? p.labelB : p.labelA,
        successi: p[successKey], insieme: p.insieme,
        wilson: wilsonLowerBound(p[successKey], p.insieme)
      }));
      const max = Math.max(...withScore.map(p => p.wilson));
      if (max === 0) return '—';
      return withScore.filter(p => p.wilson === max).map(p => `${p.altro} (${p.successi}/${p.insieme})`).join(', ');
    }
    const compagniHtml = `
      <div class="note-box">
        <b>Compagni:</b>
        miglior compagno di vittoria: ${bestCompagno('vinteInsieme')} —
        miglior compagno di sconfitta: ${bestCompagno('perseInsieme')}
      </div>
    `;

    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>% Vittorie:</b> ${totalWins} / ${totalGames} (${pctVittorie}%)</div>
      <div class="note-box"><b>Andamento % Underdog:</b> percentuale <i>cumulativa</i> partita dopo partita, in ordine cronologico (non il valore della singola partita). Stesso calcolo di "% Underdog": Giocatori Battuti / Giocatori Affrontati, sommati su tutte le partite fino a quel punto. Le prime 5 partite non sono mostrate (assestamento iniziale, troppo rumoroso). Passa il mouse su un punto per vedere data e valore esatto.</div>
      ${underdogChartHtml}
      ${streakHtml}
      ${compagniHtml}
      <div class="note-box"><b>Condizioni di Vittoria Implose:</b> raggruppa le condizioni esplose in 5 macro-categorie (Umani, Ombre, Aiutanti, Amanti, Afazione), sommando Giocate/Vinte dei membri di ciascun gruppo. Nessuna sovrapposizione tra i gruppi.</div>
      ${implodedHtml}
      <div class="note-box"><b>Nota:</b> Becchino, avendo una condizione di vittoria variabile, è escluso dai raggruppamenti e compare solo nella tabella Esplose. Il Fanatico invece eredita a fine partita la condizione di vittoria del ruolo di cui è fanatico, quindi rientra normalmente nel gruppo corrispondente.</div>
      <div class="note-box"><b>Condizioni di Vittoria Esplose:</b> mostra tutte le 24 condizioni possibili (19 atomiche + 5 composte), anche se mai giocate. Basate sulle condizioni di vittoria <i>finali</i> di fine partita (che tengono conto di eventi come vampirizzazioni, gildate, romeo di Giulietta e branco svegliato — vedi nota sopra), non sul ruolo assegnato a inizio partita. Quante volte hai giocato un ruolo appartenente a quella condizione, quante volte hai vinto <i>specificamente grazie a quella condizione</i> (deve comparire tra le fazioni vincenti di quella partita) e la relativa percentuale. Ordinata per Wilson Score, non per % Win grezza. Sommando "Giocate" su tutte le righe si ottiene il totale delle partite giocate, perché ogni ruolo conta per una condizione composta OPPURE per i suoi token atomici, mai per entrambi.</div>
      ${html}
      <div class="note-box"><b>Legenda condizioni composte</b>:<br>
        <b>Città</b> = Villaggio, Mistici, Criminali, Inquisizione<br>
        <b>Branco</b> = Capobranco, Lupo Reietto<br>
        <b>Traditore</b> = Capobranco, Lupo Reietto, Lupo Solitario<br>
        <b>Ghoul</b> = Vampiro, Nosferatu<br>
        <b>Megera</b> = Capobranco, Lupo Reietto, Lupo Solitario, Vampiro, Nosferatu, Negromante, Posseduto<br>
        Un ruolo con esattamente questa combinazione di fazioni conta solo per la condizione composta corrispondente, non per i singoli token.
      </div>
    `;
  } catch (e) { showError(e); }
}

function showRoleHistory() {
  const ruolo = document.getElementById('roleSelect').value;
  if (!ruolo) return;
  try {
    const rows = execToObjects(`
      SELECT a.play AS Partita, p.nome AS Giocatore, a.nick AS nick, gw.win_ruoli AS win_ruoli
      FROM assignments a
      JOIN players p ON p.nick = a.nick
      LEFT JOIN game_wins gw ON gw.play = a.play
      WHERE a.ruolo = ?
      ORDER BY a.play
    `, [ruolo]);
    const result = rows.map(row => {
      const winRoles = (row.win_ruoli || '').split(',').map(s => s.trim());
      return {
        Partita: row.Partita,
        Giocatore: `${row.Giocatore} (${row.nick})`,
        Vittoria: winRoles.includes(ruolo) ? 'Sì' : 'No'
      };
    });
    renderRows(['Partita', 'Giocatore', 'Vittoria'], result);
    const volte = result.length;
    const vinte = result.filter(r => r.Vittoria === 'Sì').length;
    const pct = volte > 0 ? (vinte / volte * 100).toFixed(1) : '0.0';
    document.getElementById('result').innerHTML += `
      <div class="note-box"><b>${escapeHtml(ruolo)}:</b> giocato ${volte} volte, vinto ${vinte} (${pct}%)</div>
    `;
  } catch (e) { showError(e); }
}

const MESI_IT = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
function monthLabel(yymm) {
  const [yy, mm] = yymm.split('-');
  return `${MESI_IT[parseInt(mm, 10) - 1]} 20${yy}`;
}

function populateGameSelect(games) {
  const select = document.getElementById('gameSelect');
  const groups = {};
  for (const play of games) {
    const key = play.slice(0, 5); // "YY-MM"
    if (!groups[key]) groups[key] = [];
    groups[key].push(play);
  }
  select.innerHTML = Object.keys(groups).map(key =>
    `<optgroup label="${escapeHtml(monthLabel(key))}">${groups[key].map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</optgroup>`
  ).join('');
}

async function init() {
  try {
    setStatus('Caricamento motore SQL...');
    const SQL = await initSqlJs({ locateFile: file => `https://sql.js.org/dist/${file}` });
    setStatus('Caricamento database...');
    const resp = await fetch('data.sqlite');
    if (!resp.ok) throw new Error('Impossibile caricare data.sqlite (' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    db = new SQL.Database(new Uint8Array(buf));

    const games = execToObjects('SELECT play FROM games ORDER BY play DESC');
    allGames = games.map(g => g.play);
    populateGameSelect(allGames);

    const players = execToObjects('SELECT nick, nome FROM players ORDER BY nome, nick');
    const playerSelect = document.getElementById('playerSelect');
    playerSelect.innerHTML = players.map(p => `<option value="${escapeHtml(p.nick)}">${escapeHtml(p.nome)} (${escapeHtml(p.nick)})</option>`).join('');

    const roles = execToObjects('SELECT ruolo FROM roles ORDER BY ruolo');
    const roleSelect = document.getElementById('roleSelect');
    roleSelect.innerHTML = roles.map(r => `<option value="${escapeHtml(r.ruolo)}">${escapeHtml(r.ruolo)}</option>`).join('');

    setStatus('Database caricato: ' + games.length + ' partite pronte.');
  } catch (e) {
    setStatus('Errore di caricamento.');
    showError(e);
  }
}

init();
</script>
